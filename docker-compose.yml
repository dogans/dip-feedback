services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feedback
      POSTGRES_PASSWORD: feedback
      POSTGRES_DB: feedback
    ports:
      - "5433:5432"
    volumes:
      - dip_feedback_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedback"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://feedback:feedback@db:5432/feedback
      PUBLIC_URL: http://localhost:4000
      PORT: "4000"
    ports:
      - "4000:4000"
    volumes:
      - ./api/uploads:/app/uploads
      - ./api/public:/app/public
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "4173:4173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  dip_feedback_pg:
